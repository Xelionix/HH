<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Habitats Demo</title>
    <style>
        body {
            background-image: url('assets/png/background.png'); /* Use background image */
            background-size: cover;
            background-repeat: repeat;
            background-color: #333333; /* Dark grey background color */
            margin: 0;
            font-family: url('assets/ttf/caeserdressing.ttf'), cursive, sans-serif; /* Use CaesarDressing font */
            color: #4d2d00; /* Dark Brown text color */
        }

        header {
            background-color: #2d2d2d; /* Dark grey for the header */
            padding: 10px;
            text-align: left;
            color: white;
            display: flex;
            align-items: center;
        }

        .logo {
            width: 805px;
            height: 152px;
            margin-right: 10px;
        }

        main {
            padding: 20px;
        }

        #game-container {
            width: 1200px; /* Adjust as needed */
            height: 600px; /* Adjust as needed */
            background-color: #add8e6; /* Light blue background color for game container */
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5); /* Simple shadow effect */
            margin: 0 auto; /* Center the game container */
        }

        footer {
            background-color: #2d2d2d; /* Dark grey for the footer */
            padding: 10px;
            text-align: center;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>

<body>
    <header>
        <img src='assets/png/logo.png' alt='Logo' class='logo'> <!-- Use logo image -->
    </header>

    <main>
        <div id="game-container">
            <!-- My applet will be embedded here -->
            <applet code="MainMenu.class" width="100%" height="100%">
                <!-- I'll add any parameters my applet requires -->
                <!-- Example: <param name="paramName" value="paramValue"> -->
            </applet>
        </div>
    </main>

    <footer>
        <p>WTFPL-licenced by Xelionix GP</p> <!-- I'll replace copyright with WTFPL-licenced -->
    </footer>
</body>

</html>
